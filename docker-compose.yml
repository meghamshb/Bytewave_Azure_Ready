version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:8000
    volumes:
      # Persist generated Manim videos and SQLite databases across restarts
      - ./media_output:/app/media_output
      - ./backend/learn.db:/app/backend/learn.db
    restart: unless-stopped
